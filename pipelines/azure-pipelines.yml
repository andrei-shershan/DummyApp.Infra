trigger:
  branches:
    include:
      - main
  paths:
    include:
      - DummyApp.Infra/**

pr: none

variables:
  TF_WORKING_DIR: '$(Build.SourcesDirectory)/DummyApp.Infra'
  TF_VERSION: '1.10.5'

stages:

- stage: Terraform_Test
  displayName: 'Terraform - Test'
  jobs:
  - deployment: Apply
    displayName: 'terraform apply (test)'
    environment: $(TEST_ENVIRONMENT_NAME)
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: 'Install Terraform'

          - script: |
              terraform init \
                -backend-config="resource_group_name=$(TF_BACKEND_RG)" \
                -backend-config="storage_account_name=$(TF_BACKEND_SA)" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=test.terraform.tfstate"
            displayName: 'terraform init'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform workspace select test || terraform workspace new test
            displayName: 'Select workspace: test'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform plan -var-file=envs/test.tfvars
            displayName: 'terraform plan'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform apply -var-file=envs/test.tfvars -auto-approve
            displayName: 'terraform apply'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

- stage: Terraform_Prod
  displayName: 'Terraform - Prod'
  dependsOn: Terraform_Test
  condition: succeeded()
  jobs:
  - deployment: Apply
    displayName: 'terraform apply (prod)'
    environment: $(PROD_ENVIRONMENT_NAME)
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - script: |
              wget -q https://releases.hashicorp.com/terraform/$(TF_VERSION)/terraform_$(TF_VERSION)_linux_amd64.zip
              unzip -q terraform_$(TF_VERSION)_linux_amd64.zip
              sudo mv terraform /usr/local/bin/
              terraform version
            displayName: 'Install Terraform'

          - script: |
              terraform init \
                -backend-config="resource_group_name=$(TF_BACKEND_RG)" \
                -backend-config="storage_account_name=$(TF_BACKEND_SA)" \
                -backend-config="container_name=tfstate" \
                -backend-config="key=prod.terraform.tfstate"
            displayName: 'terraform init'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform workspace select prod || terraform workspace new prod
            displayName: 'Select workspace: prod'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform plan -var-file=envs/prod.tfvars
            displayName: 'terraform plan'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          - script: |
              terraform apply -var-file=envs/prod.tfvars -auto-approve
            displayName: 'terraform apply'
            workingDirectory: '$(TF_WORKING_DIR)'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)
